name: Build

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install ARM GCC toolchain
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-arm-none-eabi

            - name: Install Make
              run: sudo apt-get install -y make

            - name: Build project
              run: make
